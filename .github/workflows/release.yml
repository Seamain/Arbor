name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # llama-cpp-sys-2 (via ggml) uses std::filesystem, which Apple's SDK only
  # backports starting macOS 10.15. Without an explicit deployment target,
  # clang falls back to a lower default and rejects std::filesystem::path
  # as "unavailable". Harmless on non-macOS runners.
  MACOSX_DEPLOYMENT_TARGET: "10.15"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Universal
          - platform: macos-universal
            os: macos-latest
            target: aarch64-apple-darwin,x86_64-apple-darwin
            args: '--target universal-apple-darwin --bundles dmg'
            artifact_name: macos-universal-dmg
            artifact_path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

          # Linux
          - platform: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: '--target x86_64-unknown-linux-gnu --bundles deb,rpm,appimage'
            artifact_name: linux-x86_64-bundles
            artifact_path: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

          # Windows
          - platform: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc --bundles msi,nsis'
            artifact_name: windows-x86_64
            artifact_path: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

          # Windows ARM64 is currently excluded: llama-cpp-sys-2 (AI feature
          # dependency) doesn't configure a clang toolset for this target, and
          # ggml's CMake build refuses to compile with MSVC on ARM. Re-add
          # once upstream supports it: https://github.com/utilityai/llama-cpp-rs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust / Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.platform, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            rpm \
            squashfs-tools \
            file

      - name: Install JS dependencies
        run: npm ci

      - name: Inject version from git tag
        shell: bash
        run: |
          # Strip leading 'v' from tag  (v1.2.3 -> 1.2.3)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version: $VERSION"

          # Update both tauri.conf.json AND tauri.linux.conf.json so the Linux
          # build (which swaps in the linux config) also gets the correct version.
          for cfg in src-tauri/tauri.conf.json src-tauri/tauri.linux.conf.json; do
            node -e "
              const fs = require('fs');
              const cfg = JSON.parse(fs.readFileSync(process.argv[1], 'utf8'));
              cfg.version = process.argv[2];
              fs.writeFileSync(process.argv[1], JSON.stringify(cfg, null, 2) + '\n');
            " "$cfg" "$VERSION"
          done

          # Update Cargo.toml (first [package] version field only).
          # Uses node instead of sed since macOS ships BSD sed, which doesn't
          # support the GNU-only `0,/regex/{...}` range-address syntax.
          node -e "
            const fs = require('fs');
            const path = 'src-tauri/Cargo.toml';
            const text = fs.readFileSync(path, 'utf8');
            let replaced = false;
            const updated = text.replace(/^version = \".*\"/m, () => {
              replaced = true;
              return 'version = \"' + process.argv[1] + '\"';
            });
            if (!replaced) throw new Error('version field not found in Cargo.toml');
            fs.writeFileSync(path, updated);
          " "$VERSION"

          echo "tauri.conf.json version: $(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")"
          echo "tauri.linux.conf.json version: $(node -e "console.log(require('./src-tauri/tauri.linux.conf.json').version)")"
          echo "Cargo.toml version: $(grep '^version' src-tauri/Cargo.toml | head -1)"

      - name: Use Linux config (disable window transparency)
        if: startsWith(matrix.platform, 'linux')
        run: cp src-tauri/tauri.linux.conf.json src-tauri/tauri.conf.json

      - name: Build Tauri app
        run: npx tauri build ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifacts (strip version number)
        shell: python3 {0}
        run: |
          import re, pathlib

          def strip_version(name):
              # Tauri naming conventions per platform:
              #   .msi / .exe / .deb / .AppImage / .dmg  use underscores:
              #     Arbor_1.0.0_x64.msi  ->  Arbor_x64.msi
              #     Arbor_1.2.3-beta.1_x64-setup.exe  ->  Arbor_x64-setup.exe
              #   .rpm uses dashes:
              #     arbor-1.0.0-1.x86_64.rpm  ->  arbor.x86_64.rpm
              patterns = {
                  '.msi':      r'^(.+?)_\d+\.\d+\.\d+[^_]*(_.*)?\.msi$',
                  '.exe':      r'^(.+?)_\d+\.\d+\.\d+[^_]*(_.*)?\.exe$',
                  '.deb':      r'^(.+?)_\d+\.\d+\.\d+[^_]*(_.*)?\.deb$',
                  '.AppImage': r'^(.+?)_\d+\.\d+\.\d+[^_]*(_.*)?\.AppImage$',
                  '.dmg':      r'^(.+?)_\d+\.\d+\.\d+[^_]*(_.*)?\.dmg$',
                  '.rpm':      r'^(.+?)-\d+\.\d+\.\d+[^-]*(?:-\d+)?\.(.+)\.rpm$',
              }
              for ext, pat in patterns.items():
                  if name.endswith(ext):
                      m = re.match(pat, name, re.IGNORECASE)
                      if m:
                          if ext == '.rpm':
                              return f"{m.group(1)}.{m.group(2)}.rpm"
                          suffix = m.group(2) or ''
                          return f"{m.group(1)}{suffix}{ext}"
              return name

          root = pathlib.Path('src-tauri/target')
          for f in root.rglob('*'):
              if not f.is_file():
                  continue
              new_name = strip_version(f.name)
              if new_name != f.name:
                  f.rename(f.parent / new_name)
                  print(f'Renamed: {f.name}  ->  {new_name}')

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-packages
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty="format:- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty="format:- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "## What's Changed" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "---" >> "$GITHUB_OUTPUT"
          echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json (updater feed)
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"   # strip leading 'v'
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${{ github.ref_name }}"

          # Build the platforms block — only include files that were actually built.
          PLATFORMS="{}"

          # macOS universal DMG
          if ls dist-packages/*.dmg 2>/dev/null | head -1 | grep -q .; then
            DMG=$(ls dist-packages/*.dmg | head -1 | xargs basename)
            PLATFORMS=$(echo "$PLATFORMS" | python3 -c "
          import json, sys
          p = json.load(sys.stdin)
          p['darwin-universal'] = {'url': '${BASE}/${DMG}', 'signature': ''}
          print(json.dumps(p))")
          fi

          # Linux AppImage
          if ls dist-packages/*.AppImage 2>/dev/null | head -1 | grep -q .; then
            AI=$(ls dist-packages/*.AppImage | head -1 | xargs basename)
            PLATFORMS=$(echo "$PLATFORMS" | python3 -c "
          import json, sys
          p = json.load(sys.stdin)
          p['linux-x86_64'] = {'url': '${BASE}/${AI}', 'signature': ''}
          print(json.dumps(p))")
          fi

          # Windows x64 NSIS installer
          if ls dist-packages/*x64-setup.exe 2>/dev/null | head -1 | grep -q .; then
            EXE=$(ls dist-packages/*x64-setup.exe | head -1 | xargs basename)
            PLATFORMS=$(echo "$PLATFORMS" | python3 -c "
          import json, sys
          p = json.load(sys.stdin)
          p['windows-x86_64'] = {'url': '${BASE}/${EXE}', 'signature': ''}
          print(json.dumps(p))")
          fi

          # Write latest.json
          python3 -c "
          import json, sys
          platforms = json.loads(sys.argv[1])
          doc = {
            'version': sys.argv[2],
            'notes': 'See release page for full changelog.',
            'pub_date': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
            'platforms': platforms,
          }
          print(json.dumps(doc, indent=2))
          " "$PLATFORMS" "$VERSION" > dist-packages/latest.json

          echo "Generated latest.json:"
          cat dist-packages/latest.json

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist-packages/**/*.dmg
            dist-packages/**/*.deb
            dist-packages/**/*.rpm
            dist-packages/**/*.AppImage
            dist-packages/**/*.msi
            dist-packages/**/*.exe
            dist-packages/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
